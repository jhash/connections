name: Build, Push, and Deploy connections

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (persistent)
        uses: docker/setup-buildx-action@v3
        with:
          name: connectionsbuilder
          driver: docker-container
          use: true
          cleanup: false

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Rust
        run: |
          if ! command -v cargo &> /dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
          cargo install cross --locked

      - name: Update Cargo.lock
        run: cargo update

      - name: Clear build cache
        run: |
          mkdir -p /home/jakehash/.cache/buildx/connections
          mkdir -p /home/jakehash/.cache/buildx/connections-new
          rm -rf /home/jakehash/.cache/buildx/connections/*
          rm -rf /home/jakehash/.cache/buildx/connections-new/*

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          builder: connectionsbuilder
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            jhash14/connections-web:latest
            jhash14/connections-web:${{ github.sha }}
          cache-from: type=local,src=/home/jakehash/.cache/buildx/connections
          cache-to: type=local,dest=/home/jakehash/.cache/buildx/connections-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /home/jakehash/.cache/buildx/connections
          mv /home/jakehash/.cache/buildx/connections-new /home/jakehash/.cache/buildx/connections

      - name: Deploy web to swarm (oci)
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ci \
            deploy@${{ secrets.OCI_SERVER_IP }} \
            'docker service update --resolve-image=always --image jhash14/connections-web:latest connections_web'

      - name: Build archiver (amd64)
        run: |
          cross build --release -p connections-cli --target x86_64-unknown-linux-gnu
          mkdir -p bin/amd64
          cp target/x86_64-unknown-linux-gnu/release/connections bin/amd64/connections

      - name: Verify amd64 binary
        run: |
          ls -la bin/amd64/
          ls -la bin/amd64/connections

      - name: Build archiver (arm64)
        run: |
          cross build --release -p connections-cli --target aarch64-unknown-linux-gnu
          mkdir -p bin/arm64
          cp target/aarch64-unknown-linux-gnu/release/connections bin/arm64/connections

      - name: Verify arm64 binary
        run: |
          ls -la bin/arm64/
          ls -la bin/arm64/connections

      - name: Build and push archiver
        uses: docker/build-push-action@v6
        with:
          builder: connectionsbuilder
          context: .
          file: Dockerfile.archiver
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            jhash14/connections-archiver:latest
            jhash14/connections-archiver:${{ github.sha }}
          cache-from: type=local,src=/home/jakehash/.cache/buildx/connections
          cache-to: type=local,dest=/home/jakehash/.cache/buildx/connections-new,mode=max

      - name: Rotate build cache
        run: |
          rm -rf /home/jakehash/.cache/buildx/connections
          mv /home/jakehash/.cache/buildx/connections-new /home/jakehash/.cache/buildx/connections

      - name: Deploy archiver to swarm (oci)
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ci \
            deploy@${{ secrets.OCI_SERVER_IP }} \
            'docker service update --resolve-image=always --image jhash14/connections-archiver:latest connections_archiver'
